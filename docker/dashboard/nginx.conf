# Configuración Nginx del dashboard SIEM
# Sirve los ficheros estáticos de React y hace de proxy para la API de Elasticsearch

server {
    listen 80;
    server_name localhost;

    # Raíz donde están los ficheros del build de Vite
    root /usr/share/nginx/html;
    index index.html;

    # Todas las rutas devuelven el index.html (SPA con React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Desactivamos caché agresiva para archivos HTML
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
